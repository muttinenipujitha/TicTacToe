services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: heroiclabs/nakama:3.21.1
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up \
          --database.address postgres:localdb@postgres:5432/nakama && \
        exec /nakama/nakama \
          --name nakama1 \
          --database.address postgres:localdb@postgres:5432/nakama \
          --logger.level DEBUG \
          --session.token_expiry_sec 7200 \
          --runtime.js_entrypoint build/index.js
    volumes:
      - ./:/nakama/data/modules
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: